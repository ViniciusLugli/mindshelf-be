  /api/ws:
    get:
      description: Open a WebSocket connection on `/api/ws` using the same authentication
        used by protected HTTP routes. After connecting, every client message must
        use the envelope `{"action":"event_name","payload":{...}}`. Every server response
        uses the envelope `{"action":"event_name","success":true|false,"data":...,"error":"..."}`.
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Connect to the authenticated WebSocket
      tags:
      - websocket
  /login:
    post:
      consumes:
      - application/json

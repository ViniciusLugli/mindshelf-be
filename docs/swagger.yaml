      description: Send `{"action":"mark_messages_read","payload":{...}}` after connecting
        to `/api/ws`. The sender receives `mark_messages_read` with `responses.MarkMessagesReadResponse`.
        If at least one message changes, the other participant also receives the `messages_read`

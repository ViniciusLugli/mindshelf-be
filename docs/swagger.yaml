      - application/json
      description: Send `{"action":"reject_friend_request","payload":{"friend_id":"..."}}`
        after connecting to `/api/ws`. The authenticated user rejects a previously
        received pending invitation from `friend_id`. The server replies with `reject_friend_request`
        and a confirmation message.

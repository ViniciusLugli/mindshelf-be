        type: integer
    type: object
  responses.GroupResponse:
    properties:
      color:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  responses.MarkMessagesReadResponse:
    properties:
      read_at:
        type: string
      updated:
        type: integer
      with_user_id:
        type: string
    type: object
  responses.MessageResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      read_at:
        type: string
      received_at:
        type: string
      receiver:
        $ref: '#/definitions/responses.UserResponse'
      receiver_id:
        type: string
      sender:
        $ref: '#/definitions/responses.UserResponse'
      sender_id:
        type: string
      shared_task:
        $ref: '#/definitions/responses.SharedTaskSnapshotResponse'
      type:
        type: string
    type: object
  responses.PaginatedGroupResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.GroupResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  responses.PaginatedTaskResponse:
    properties:
      data:
        items:

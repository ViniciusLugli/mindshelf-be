      with_user_id:
        type: string
    type: object
  requests.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  requests.MarkMessagesReadRequest:
    properties:
      up_to_message_id:
        type: string
      with_user_id:
        type: string
    type: object
  requests.SendChatRequest:
    properties:
      content:
        type: string
      to_user_id:
        type: string
    type: object
  requests.ShareTaskRequest:
    properties:
      content:
        type: string
      task_id:
        type: string
      to_user_id:
        type: string
    type: object
  requests.UpdateGroupRequest:
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    - name
    type: object
  requests.UpdateTaskRequest:
    properties:
      id:
        type: string
      notes:
        type: string
      title:
        type: string
    required:
    - id
    type: object
  requests.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  responses.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/responses.UserResponse'
    type: object
  responses.GroupResponse:
    properties:
      color:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  responses.PaginatedGroupResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.GroupResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  responses.PaginatedTaskResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.TaskResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  responses.PaginatedUserResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.UserResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  responses.TaskResponse:
    properties:
      group_color:
        type: string
      group_id:
        type: string
      group_name:
        type: string
      notes:
        type: string
      title:
        type: string
    type: object
  responses.UserResponse:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object

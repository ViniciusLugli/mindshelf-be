      - websocket
  /ws/share_task:
    post:
      consumes:
      - application/json
      description: Send `{"action":"share_task","payload":{...}}` after connecting
        to `/api/ws`. The task must belong to the authenticated sender. The server
        persists a chat message with `type = shared_task`, returns `message_sent`
        to the sender, and broadcasts `message_received` to the recipient. The payload
        in `data` is `responses.MessageResponse` with the `shared_task` snapshot filled.

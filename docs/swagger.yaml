  /ws/accept_friend_request:
    post:
      consumes:
      - application/json
      description: Send `{"action":"accept_friend_request","payload":{"friend_id":"..."}}`
        after connecting to `/api/ws`. The authenticated user accepts a previously
        received pending invitation from `friend_id`. The server replies with `accept_friend_request`
        and a confirmation message.
      parameters:
      - description: Friend request payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/requests.FriendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.StatusMessageResponse'
      security:
      - ApiKeyAuth: []
      summary: Accept friend request over WebSocket
      tags:
      - websocket
  /ws/get_chats:
    get:
      consumes:
      - application/json
      description: Send `{"action":"get_chats","payload":null}` after connecting to
        `/api/ws`. The server responds to the same client with the `get_chats` event.
        The event `data` contains `[]responses.ChatResponse` with friend info, last
        message, and unread count.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/responses.ChatResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: 'WebSocket event: get_chats'
      tags:
      - websocket

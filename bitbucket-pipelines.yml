image: golang:1.26

options:
  size: 2x

definitions:
  caches:
    go: /go/pkg/mod

  services:
    docker:
      memory: 6144

  steps:
    - step: &test_go
        name: Testes - Go/Gin
        caches:
          - go
        script:
          - go mod download
          - test -z "$(gofmt -l .)" || (echo "Files not formatted with gofmt" && exit 1)
          - go vet ./...
          - go test ./... -coverprofile=coverage.out
          - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o app ./cmd/api

    - step: &docker_publish_go
        name: Build e Push Docker - Go/Gin
        services:
          - docker
        script:
          - apt-get update && apt-get install -y unzip curl
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip -q awscliv2.zip
          - ./aws/install
          - export IMAGE_TAG=${BITBUCKET_BRANCH//\//-}-${BITBUCKET_COMMIT:0:7}
          - export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          - export IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          - export IMAGE_URI_LATEST=${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          - docker build -t "${IMAGE_URI}" -t "${IMAGE_URI_LATEST}" .
          - docker push "${IMAGE_URI}"
          - docker push "${IMAGE_URI_LATEST}"
          - printf "IMAGE_TAG=%s\nIMAGE_URI=%s\n" "${IMAGE_TAG}" "${IMAGE_URI}" > image-info.env
        artifacts:
          - image-info.env

    - step: &deploy_ecs_go
        name: Deploy ECS - Go/Gin
        image: python:3.12-slim
        script:
          - apt-get update && apt-get install -y unzip curl
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip -q awscliv2.zip
          - ./aws/install
          - set -a
          - . ./image-info.env
          - set +a
          - export CURRENT_TASK_DEF_ARN=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE_BACKEND}" --region "${AWS_REGION}" --query 'services[0].taskDefinition' --output text)
          - export TASK_DEF=$(aws ecs describe-task-definition --task-definition "${CURRENT_TASK_DEF_ARN}" --region "${AWS_REGION}" --query 'taskDefinition' --output json)
          - |
            export NEW_TASK_DEF=$(echo "${TASK_DEF}" | python3 -c "
            import json, sys, os
            td = json.load(sys.stdin)
            td['containerDefinitions'][0]['image'] = os.environ['IMAGE_URI']
            for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
                td.pop(k, None)
            print(json.dumps(td))
            ")
          - export NEW_ARN=$(aws ecs register-task-definition --cli-input-json "${NEW_TASK_DEF}" --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
          - aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE_BACKEND}" --task-definition "${NEW_ARN}" --force-new-deployment --region "${AWS_REGION}"
          - aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE_BACKEND}" --region "${AWS_REGION}"
          - echo "Backend deployed successfully. Image ${IMAGE_URI}"

pipelines:
  branches:
    main:
      - step: *test_go
      - step: *docker_publish_go
      - step:
          <<: *deploy_ecs_go
          deployment: production

image: golang:1.26
options:
  docker: true
  size: 2x
definitions:
  caches:
    go: /go/pkg/mod
  services:
    docker:
      memory: 6144
  steps:
    - step: &test_go
        name: Testes - Go/Gin
        caches:
          - go
        script:
          - go version
          - go mod download
          - test -z "$(gofmt -l .)" || (echo "Arquivos não formatados com gofmt" && exit 1)
          - go vet ./...
          - go test ./... -coverprofile=coverage.out
          - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o app ./cmd/api
        artifacts:
          - coverage.out
          - Dockerfile

    - step: &docker_publish_go
        name: Build e Push Docker - Go/Gin
        size: 2x
        services:
          - docker
        script:
          - apt-get update && apt-get install -y unzip curl python3
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip -q awscliv2.zip
          - ./aws/install
          - export IMAGE_TAG=${BITBUCKET_BRANCH//\//-}-${BITBUCKET_COMMIT:0:7}
          - export IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}
          - export IMAGE_URI_LATEST=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest
          - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          - docker build -t "${IMAGE_URI}" -t "${IMAGE_URI_LATEST}" .
          - docker push "${IMAGE_URI}"
          - docker push "${IMAGE_URI_LATEST}"
          - echo "IMAGE_TAG=${IMAGE_TAG}" > image-info.env
          - echo "IMAGE_URI=${IMAGE_URI}" >> image-info.env
        artifacts:
          - image-info.env

    - step: &deploy_ecs_go
        name: Deploy ECS - Go/Gin
        image: python:3.12-slim
        script:
          - apt-get update && apt-get install -y unzip curl python3
          - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          - unzip -q awscliv2.zip
          - ./aws/install
          - set -a
          - source image-info.env
          - set +a
          - test -n "${IMAGE_URI}" || (echo "IMAGE_URI ausente em image-info.env" && cat image-info.env && exit 1)
          - export ECS_CONTAINER_NAME_BACKEND=${ECS_CONTAINER_NAME_BACKEND:-backend}
          - export ECS_HEALTHCHECK_GRACE_PERIOD_SECONDS=${ECS_HEALTHCHECK_GRACE_PERIOD_SECONDS:-120}
          - TASK_DEF=$(aws ecs describe-task-definition --task-definition ${ECS_TASK_FAMILY_BACKEND} --region ${AWS_REGION} --query 'taskDefinition' --output json)
          - NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "import json, os, sys; td = json.load(sys.stdin); target = os.environ.get('ECS_CONTAINER_NAME_BACKEND', 'backend'); image = os.environ['IMAGE_URI']; containers = td.get('containerDefinitions', []); idx = next((i for i, c in enumerate(containers) if c.get('name') == target), -1); idx >= 0 or sys.exit(f\"container '{target}' not found in task definition\"); containers[idx]['image'] = image; [td.pop(k, None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")
          - NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${AWS_REGION} --query 'taskDefinition.taskDefinitionArn' --output text)
          - aws ecs update-service --cluster ${ECS_CLUSTER} --service ${ECS_SERVICE_BACKEND} --task-definition $NEW_ARN --health-check-grace-period-seconds ${ECS_HEALTHCHECK_GRACE_PERIOD_SECONDS} --force-new-deployment --region ${AWS_REGION}
          - |
            if ! aws ecs wait services-stable --cluster ${ECS_CLUSTER} --services ${ECS_SERVICE_BACKEND} --region ${AWS_REGION}; then
              echo "ECS service failed to stabilize. Latest service events:"
              aws ecs describe-services --cluster ${ECS_CLUSTER} --services ${ECS_SERVICE_BACKEND} --region ${AWS_REGION} --query 'services[0].events[0:20].[createdAt,message]' --output table

              STOPPED_TASKS=$(aws ecs list-tasks --cluster ${ECS_CLUSTER} --service-name ${ECS_SERVICE_BACKEND} --desired-status STOPPED --max-items 10 --region ${AWS_REGION} --query 'taskArns' --output text)
              if [ -n "$STOPPED_TASKS" ] && [ "$STOPPED_TASKS" != "None" ]; then
                echo "Latest stopped tasks diagnostics:"
                aws ecs describe-tasks --cluster ${ECS_CLUSTER} --tasks $STOPPED_TASKS --region ${AWS_REGION} --query 'tasks[*].{taskArn:taskArn,stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[*].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}' --output table
              else
                echo "No stopped tasks found for diagnostics."
              fi

              exit 1
            fi
          - echo "Backend deployado com sucesso! Image ${IMAGE_URI}"

pipelines:
  branches:
    main:
      - step: *test_go
      - step:
          <<: *docker_publish_go
          deployment: staging
      - step:
          <<: *deploy_ecs_go
          deployment: production
